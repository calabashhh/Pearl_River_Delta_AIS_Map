<!DOCTYPE html>
<html>
<head>
  <title>AISStream Test</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
</head>
<body>

<h1>Pearl River Delta AIS Map</h1>

<div id="connectionStatus">Connecting to AIS feed...</div>
  
<div id="stats">
  <b>Live AIS Dashboard</b><br>
  Active vessels: <span id="activeCount">0</span><br>
  Position reports: <span id="positionCount">0</span><br>
  Class B reports: <span id="classBCount">0</span><br>
  Static data reports: <span id="staticCount">0</span>
  Last message: <span id="lastMessageTime">Waiting...</span>
  <button id="pauseButton" onclick="togglePause()">Pause</button>
</div>

<div id="shipList">
  <b>Active Vessels</b>
  <input id="shipSearch" placeholder="Search vessel or MMSI..." />
  <div id="shipRows"></div>
</div>

<div id="legend">
  <b>Vessel Message Types</b><br>
  <span class="legend-dot position"></span> Position Report<br>
  <span class="legend-dot classb"></span> Class B Position<br>
  <span class="legend-dot static"></span> Static Ship Data
</div>

<div id="filters">
  <b>Filters</b><br>
  <label><input type="checkbox" id="filterPosition" checked> Position Reports</label><br>
  <label><input type="checkbox" id="filterClassB" checked> Class B Reports</label><br>
  <label><input type="checkbox" id="filterStatic" checked> Static Data</label>
</div>
  
<div id="map"></div>

<style>
  #map {
    height: 90vh;
    width: 100%;
  }

  #stats {
    position: absolute;
    top: 70px;
    right: 20px;
    z-index: 1000;
    background: white;
    padding: 12px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  #legend {
    position: absolute;
    bottom: 30px;
    right: 20px;
    z-index: 1000;
    background: white;
    padding: 12px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  
  .legend-dot {
    display: inline-block;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    margin-right: 6px;
  }
  
  .position {
    background: #1e88e5;
  }
  
  .classb {
    background: #fb8c00;
  }
  
  .static {
    background: #8e24aa;
  }

  #connectionStatus {
    position: absolute;
    top: 70px;
    left: 60px;
    z-index: 1000;
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  #shipList {
    position: absolute;
    top: 220px;
    right: 20px;
    width: 230px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 1000;
    background: white;
    padding: 12px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  #shipSearch {
    width: 100%;
    box-sizing: border-box;
    margin: 8px 0;
    padding: 6px;
  }
  
  .ship-row {
    border-top: 1px solid #ddd;
    padding: 6px 0;
    cursor: pointer;
  }
  
  .ship-row:hover {
    background: #f3f3f3;
  }

  .ship-row.selected {
    background: #dbeafe;
    font-weight: bold;
  }
  
  #filters {
    position: absolute;
    bottom: 160px;
    right: 20px;
    z-index: 1000;
    background: white;
    padding: 12px;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
  <script>
  const map = L.map('map').setView([22.5, 114.15], 10);

  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {
      attribution: '&copy; OpenStreetMap & CARTO'
    }
  ).addTo(map);


  const API_KEY = "73fe2684e88323e4a98687268f7fdec16fc615c5";

  const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

  socket.onopen = function () {
    document.getElementById("connectionStatus").textContent = "Connected to AIS feed";
  
    const subscriptionMessage = {
      APIKey: API_KEY,
      BoundingBoxes: [
        [[21.9, 113.25], [22.6, 114.7]]
      ]
    };
  
    socket.send(JSON.stringify(subscriptionMessage));
  };

    
    const shipMarkers = {};
    const shipInfo = {};
    const shipTrails = {};
    const shipTrailCoords = {};
    //const shipDirectionLines = {};
    const MAX_TRAIL_POINTS = 25;

    let positionCount = 0;
    let classBCount = 0;
    let staticCount = 0;
    let selectedMMSI = null;
    let isPaused = false;

    function normalizeAISMessage(data) {
      return {
        lat: data.MetaData?.latitude,
        lon: data.MetaData?.longitude,
        mmsi: data.MetaData?.MMSI,
        shipName: data.MetaData?.ShipName?.trim() || "Unknown Ship",
        messageType: data.MessageType,
        time: data.MetaData?.time_utc,
        raw: data,
        sog: data.Message?.PositionReport?.Sog 
          ?? data.Message?.StandardClassBPositionReport?.Sog,
        cog: data.Message?.PositionReport?.Cog 
          ?? data.Message?.StandardClassBPositionReport?.Cog,
        heading: data.Message?.PositionReport?.TrueHeading 
          ?? data.Message?.StandardClassBPositionReport?.TrueHeading,
      };
    }
    
    function getMarkerStyle(messageType) {
      if (messageType === "PositionReport") {
        return {
          radius: 7,
          color: "#1565c0",
          fillColor: "#1e88e5",
          fillOpacity: 0.85,
          weight: 1
        };
      }
    
      if (messageType === "StandardClassBPositionReport") {
        return {
          radius: 5,
          color: "#ef6c00",
          fillColor: "#fb8c00",
          fillOpacity: 0.8,
          weight: 1
        };
      }
    
      if (messageType === "ShipStaticData") {
        return {
          radius: 4,
          color: "#6a1b9a",
          fillColor: "#8e24aa",
          fillOpacity: 0.7,
          weight: 1
        };
      }
    
      return {
        radius: 4,
        color: "#455a64",
        fillColor: "#78909c",
        fillOpacity: 0.6,
        weight: 1
      };
    }

    function focusShip(mmsi) {
      const marker = shipMarkers[mmsi];
    
      if (!marker) {
        return;
      }
    
      map.setView(marker.getLatLng(), 14);
      marker.openPopup();
    }

    function selectShip(mmsi) {
      selectedMMSI = mmsi;
    
      const marker = shipMarkers[mmsi];
      if (!marker) return;
    
      const info = shipInfo[mmsi];
      const style = getMarkerStyle(info.type);
    
      marker.setIcon(createShipIcon(style.color, info.cog, 38));
      map.setView(marker.getLatLng(), 14);
      marker.openPopup();
    }

    function isTypeVisible(messageType) {
      if (messageType === "PositionReport") {
        return document.getElementById("filterPosition").checked;
      }
    
      if (messageType === "StandardClassBPositionReport") {
        return document.getElementById("filterClassB").checked;
      }
    
      if (messageType === "ShipStaticData") {
        return document.getElementById("filterStatic").checked;
      }
    
      return true;
    }

 /*   function getDirectionLine(lat, lon, cog, lengthKm = 0.3) {
      if (cog === undefined || cog === null) {
        return null;
      }*/
    
 /*     const earthRadiusKm = 6371;
      const bearing = cog * Math.PI / 180;
      const lat1 = lat * Math.PI / 180;
      const lon1 = lon * Math.PI / 180;
      const distance = lengthKm / earthRadiusKm;
    
      const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(distance) +
        Math.cos(lat1) * Math.sin(distance) * Math.cos(bearing)
      );
    
      const lon2 = lon1 + Math.atan2(
        Math.sin(bearing) * Math.sin(distance) * Math.cos(lat1),
        Math.cos(distance) - Math.sin(lat1) * Math.sin(lat2)
      );
    
      return [
        [lat, lon],
        [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI]
      ];
    }*/

    function darkenColor(hex, factor = 0.55) {
      const r = Math.floor(parseInt(hex.slice(1, 3), 16) * factor);
      const g = Math.floor(parseInt(hex.slice(3, 5), 16) * factor);
      const b = Math.floor(parseInt(hex.slice(5, 7), 16) * factor);
    
      return `rgb(${r}, ${g}, ${b})`;
    }
    
    function createShipIcon(color, cog, size = 26) {
      const rotation = cog ?? 0;
      const outlineColor = darkenColor(color, 0.55);
    
      return L.divIcon({
        className: "ship-icon",
        html: `
          <svg
            width="${size}"
            height="${size}"
            viewBox="0 0 24 24"
            style="transform: rotate(${rotation}deg); transform-origin: center center;"
          >
            <polygon
              points="12,1 21,23 12,18 3,23"
              fill="${color}"
              stroke="${outlineColor}"
              stroke-width="2"
              stroke-linejoin="round"
            />
          </svg>
        `,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2]
      });
    }

    function animateMarker(marker, newLatLng, duration = 1000) {
      const startLatLng = marker.getLatLng();
      const startTime = performance.now();
    
      function step(currentTime) {
        const elapsed = currentTime - startTime;
        const t = Math.min(elapsed / duration, 1);
    
        const lat = startLatLng.lat + (newLatLng[0] - startLatLng.lat) * t;
        const lon = startLatLng.lng + (newLatLng[1] - startLatLng.lng) * t;
    
        marker.setLatLng([lat, lon]);
    
        if (t < 1) {
          requestAnimationFrame(step);
        }
      }
    
      requestAnimationFrame(step);
    }

    function togglePause() {
      isPaused = !isPaused;
      document.getElementById("pauseButton").textContent =
        isPaused ? "Resume" : "Pause";
    }
    
socket.onmessage = async function (event) {
  const text = await event.data.text();

  try {
    const data = JSON.parse(text);
      if (isPaused) {
        return;
      }

    document.getElementById("lastMessageTime").textContent =
      new Date().toLocaleTimeString();

    const vessel = normalizeAISMessage(data);

 /*     console.log("Movement fields:", {
        messageType: vessel.messageType,
        rawMessage: vessel.raw.Message
      }); */

    if (data.MessageType === "PositionReport") positionCount++;
    if (data.MessageType === "StandardClassBPositionReport") classBCount++;
    if (data.MessageType === "ShipStaticData") staticCount++;
  
    document.getElementById("positionCount").textContent = positionCount;
    document.getElementById("classBCount").textContent = classBCount;
    document.getElementById("staticCount").textContent = staticCount;
    
   //     console.log("Full AIS message:", data);
    
    const lat = vessel.lat;
    const lon = vessel.lon;
    const mmsi = vessel.mmsi;
    const shipName = vessel.shipName;
      if (!isTypeVisible(vessel.messageType)) {
        return;
      }

    shipInfo[mmsi] = {
      name: shipName,
      type: vessel.messageType,
      time: vessel.time || "Unknown",
      cog: vessel.cog
    };
    
    const searchText = document.getElementById("shipSearch").value.toLowerCase();

    const rowsHtml = Object.entries(shipInfo)
      .filter(([id, info]) =>
        id.includes(searchText) ||
        info.name.toLowerCase().includes(searchText)
      )
      .slice(-20)
      .map(([id, info]) => `
        <div class="ship-row ${selectedMMSI === id ? 'selected' : ''}" onclick="selectShip('${id}')">
          <b>${info.name}</b><br>
          MMSI: ${id}<br>
          ${info.type}
        </div>
      `)
      .join("");
    
    document.getElementById("shipRows").innerHTML = rowsHtml;

    if (lat === undefined || lon === undefined || mmsi === undefined) {
      return;
    }

    const popupContent = `
      <b>${shipName}</b><br>
      MMSI: ${mmsi}<br>
      Type: ${vessel.messageType}<br>
      Speed: ${vessel.sog ?? "Unknown"} knots<br>
      Course: ${vessel.cog ?? "Unknown"}°<br>
      Last update: ${vessel.time || "Unknown"}
    `;

    if (shipMarkers[mmsi]) {
      animateMarker(shipMarkers[mmsi], [lat, lon], 1000);
    
      const iconSize = selectedMMSI === mmsi ? 38 : 26;
      
      shipMarkers[mmsi]
        .setIcon(createShipIcon(getMarkerStyle(vessel.messageType).color, vessel.cog, iconSize))
        .setPopupContent(popupContent);
    
      shipTrailCoords[mmsi].push([lat, lon]);
    
      if (shipTrailCoords[mmsi].length > MAX_TRAIL_POINTS) {
        shipTrailCoords[mmsi].shift();
      }
    
      shipTrails[mmsi].setLatLngs(shipTrailCoords[mmsi]);
    
    } else {
      const markerStyle = getMarkerStyle(vessel.messageType);
    
      shipMarkers[mmsi] = L.marker([lat, lon], {
        icon: createShipIcon(markerStyle.color, vessel.cog)
      })
        .addTo(map)
        .bindPopup(popupContent);

      shipMarkers[mmsi].on("mouseover", function () {
        this.setIcon(
          createShipIcon(
            markerStyle.color,
            vessel.cog,
            30
          )
        );
      
        this.openPopup();
      });
      
      shipMarkers[mmsi].on("mouseout", function () {
        this.setIcon(
          createShipIcon(
            markerStyle.color,
            vessel.cog,
            22
          )
        );

      shipMarkers[mmsi].on("click", function () {
        selectShip(mmsi);
      });
      
        this.closePopup();
      });
    
      shipTrailCoords[mmsi] = [[lat, lon]];
    
      shipTrails[mmsi] = L.polyline(shipTrailCoords[mmsi], {
        color: markerStyle.color,
        weight: 2,
        opacity: 0.6
      }).addTo(map);
    }
  
    document.getElementById("activeCount").textContent =
      Object.keys(shipMarkers).length;
    
  } catch (err) {
    console.log("Could not parse JSON:", text);
  }
};
    socket.onclose = function (event) {
    document.getElementById("connectionStatus").textContent = "AIS feed disconnected";
    console.log("WebSocket closed:", event);
  };
  
  socket.onerror = function (error) {
    document.getElementById("connectionStatus").textContent = "AIS feed error";
    console.error("WebSocket error:", error);
  };
</script>
</body>
</html>
