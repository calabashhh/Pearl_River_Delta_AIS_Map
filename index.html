<!DOCTYPE html>
<html>
<head>
  <title>AISStream Test</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
</head>
<body>

<h1>Pearl River Delta AIS Map</h1>

<div id="map"></div>

<style>
  #map {
    height: 90vh;
    width: 100%;
  }
</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
  <script>
  const map = L.map('map').setView([22.3, 114.15], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const API_KEY = "53b45131d4f4f35298c7df332904efd0df5847e5";

  const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

  socket.onopen = function () {
    console.log("Connected. Waiting for AIS messages...");

    const subscriptionMessage = {
      APIKey: API_KEY,
      BoundingBoxes: [
        [[21.0, 113.25], [22.6, 114.5]]
      ]
    };

    socket.send(JSON.stringify(subscriptionMessage));
    console.log("Subscription sent:", subscriptionMessage);
  };

  socket.onmessage = async function (event) {
    const text = await event.data.text();

    try {
      const data = JSON.parse(text);

      console.log("Parsed AIS message:", data);

      const lat = data.MetaData?.latitude;
      const lon = data.MetaData?.longitude;

      console.log("lat/lon:", lat, lon);

      const shipName = data.MetaData?.ShipName?.trim() || "Unknown Ship";

      if (lat !== undefined && lon !== undefined) {
        L.marker([lat, lon])
          .addTo(map)
          .bindPopup(`
            <b>${shipName}</b><br>
            MMSI: ${data.MetaData.MMSI}<br>
            Type: ${data.MessageType}
          `);
      }

    } catch (err) {
      console.log("Could not parse JSON:", text);
    }
  };
  socket.onclose = function (event) {
  console.log("WebSocket closed:", event);
  };

  socket.onerror = function (error) {
    console.error("WebSocket error:", error);
  };
</script>
</body>
</html>
