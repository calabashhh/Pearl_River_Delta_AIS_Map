<!DOCTYPE html>
<html>
<head>
  <title>AISStream Test</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
</head>
<body>

<h1>Pearl River Delta AIS Map</h1>

<div id="map"></div>

<style>
  #map {
    height: 90vh;
    width: 100%;
  }
</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
  <script>
  const map = L.map('map').setView([22.5, 114.15], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const API_KEY = "53b45131d4f4f35298c7df332904efd0df5847e5";

  const socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

  socket.onopen = function () {
    console.log("Connected. Waiting for AIS messages...");

    const subscriptionMessage = {
      APIKey: API_KEY,
      BoundingBoxes: [
        [[21.7, 113.0], [23.0, 115.0]]
      ]
    };

  socket.send(JSON.stringify(subscriptionMessage));
  console.log("Subscription sent:", subscriptionMessage);
  };

    const shipMarkers = {};
    const shipTrails = {};
    const shipTrailCoords = {};
    const MAX_TRAIL_POINTS = 25;

    function getMarkerStyle(messageType) {

        if (messageType === "PositionReport") {
          return {
            radius: 7,
            color: "#1565c0",
            fillColor: "#1e88e5",
            fillOpacity: 0.85,
            weight: 1
          };
        }
      
        if (messageType === "StandardClassBPositionReport") {
          return {
            radius: 5,
            color: "#ef6c00",
            fillColor: "#fb8c00",
            fillOpacity: 0.8,
            weight: 1
          };
        }
      
        if (messageType === "ShipStaticData") {
          return {
            radius: 4,
            color: "#6a1b9a",
            fillColor: "#8e24aa",
            fillOpacity: 0.7,
            weight: 1
          };
        }
      
        return {
          radius: 4,
          color: "#455a64",
          fillColor: "#78909c",
          fillOpacity: 0.6,
          weight: 1
        };
      }
socket.onmessage = async function (event) {
  const text = await event.data.text();

  try {
    const data = JSON.parse(text);
    
        console.log("Full AIS message:", data);
    
    const lat = data.MetaData?.latitude;
    const lon = data.MetaData?.longitude;
    const mmsi = data.MetaData?.MMSI;
    const shipName = data.MetaData?.ShipName?.trim() || "Unknown Ship";


    if (lat === undefined || lon === undefined || mmsi === undefined) {
      return;
    }

    const popupContent = `
      <b>${shipName}</b><br>
      MMSI: ${mmsi}<br>
      Type: ${data.MessageType}<br>
      Last update: ${data.MetaData?.time_utc || "Unknown"}
    `;

     if (shipMarkers[mmsi]) {
      shipMarkers[mmsi]
        .setLatLng([lat, lon])
        .setPopupContent(popupContent);
    
      shipTrailCoords[mmsi].push([lat, lon]);
    
      if (shipTrailCoords[mmsi].length > MAX_TRAIL_POINTS) {
        shipTrailCoords[mmsi].shift();
      }
    
      shipTrails[mmsi].setLatLngs(shipTrailCoords[mmsi]);
    
    } else {
      const markerStyle = getMarkerStyle(data.MessageType);
    
      shipMarkers[mmsi] = L.circleMarker([lat, lon], markerStyle)
        .addTo(map)
        .bindPopup(popupContent);
    
      shipTrailCoords[mmsi] = [[lat, lon]];
    
      shipTrails[mmsi] = L.polyline(shipTrailCoords[mmsi], {
        color: markerStyle.color,
        weight: 2,
        opacity: 0.6
      }).addTo(map);
    }

  } catch (err) {
    console.log("Could not parse JSON:", text);
  }
};
  socket.onclose = function (event) {
  console.log("WebSocket closed:", event);
  };

  socket.onerror = function (error) {
    console.error("WebSocket error:", error);
  };
</script>
</body>
</html>
